name: Update GitHub Stats Widget

on:
  schedule:
    - cron: '0 6 * * *'         # daily at 06:00 UTC
  push:
    branches: [main]
    paths:
      - '.github/scripts/generate-widget.js'
      - '.github/workflows/update-widget.yml'
  workflow_dispatch:             # allow manual trigger from the Actions tab

concurrency:
  group: update-widget
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure main is up to date
        run: |
          set -euo pipefail
          git checkout main
          git pull --ff-only origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SVG widget
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          # ── Customise your details here ───────────────────────────────────
          WIDGET_THEME:    'nord'   # 'default' | 'nord' | 'catppuccin'
          WIDGET_IDE:      'Visual Studio Community'
          WIDGET_STACK:    'C++ · Java · JavaScript · HTML · CSS · Node.js'
          WIDGET_LEARNING: 'Java · Static Library Systems · TypeScript · Kotlin '
          WIDGET_CONTACT:  |-
            Email: AKTodorov24@outlook.com | AKTodorov24@codingburgas.bg
            Discord: dimdena
          WIDGET_LOCATION: 'Burgas, Bulgaria'
          # ─────────────────────────────────────────────────────────────────
          OUTPUT_FILE: github-stats.svg
        run: node .github/scripts/generate-widget.js

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add github-stats.svg
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: update github stats widget [skip ci]"
          
          git pull --rebase origin main
          git push origin main
